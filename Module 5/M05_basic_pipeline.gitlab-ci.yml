# ============================================================
# RoboVision Controller — CI/CD Pipeline
# Module 5: CI/CD Fundamentals
#
# References:
#   https://docs.gitlab.com/ee/ci/yaml/
#   https://docs.gitlab.com/ee/ci/variables/
#   https://docs.gitlab.com/ee/ci/yaml/#artifacts
# ============================================================

# ─── GLOBAL DEFAULTS ─────────────────────────────────────────
# Inherited by all jobs unless overridden at job level
default:
  image: python:3.11-slim
  before_script:
    - pip install --quiet -r requirements.txt
  # Retry once on network/runner failures (not script failures)
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

# ─── PIPELINE STAGES ─────────────────────────────────────────
# Execution order: left → right
# Jobs within a stage run IN PARALLEL
# Next stage starts only when ALL jobs in current stage pass
stages:
  - validate    # Code quality and style
  - test        # Unit tests and coverage
  - build       # Build Docker image
  - package     # Generate deployment artefacts

# ─── PIPELINE VARIABLES ──────────────────────────────────────
# Non-sensitive configuration. Secrets go in Settings → CI/CD → Variables
variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONPATH: "."

# ─── STAGE: validate ─────────────────────────────────────────

lint-python:
  stage: validate
  script:
    - echo "▶ Python style check (flake8)"
    - flake8 app/ tests/ --max-line-length=120 --statistics
    - echo "✅ Lint passed"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'
  cache:
    key: pip-cache
    paths:
      - .cache/pip

# ─── STAGE: test ─────────────────────────────────────────────

unit-tests:
  stage: test
  script:
    - echo "▶ Unit tests with coverage"
    - |
      pytest tests/ \
        --cov=app \
        --cov-report=term-missing \
        --cov-report=xml:coverage.xml \
        --junitxml=test-results.xml \
        -v
    - echo "✅ Tests passed"
  # Extract coverage % from pytest-cov output — displayed in GitLab UI
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    name: "test-results-${CI_COMMIT_SHORT_SHA}"
    paths:
      - test-results.xml
      - coverage.xml
    reports:
      # GitLab parses this for MR test summary widget
      junit: test-results.xml
      # GitLab parses this for coverage visualisation
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 30 days
    # IMPORTANT: Upload artifacts even on failure — needed to diagnose which test failed
    when: always
  cache:
    key: pip-cache
    paths:
      - .cache/pip

# ─── STAGE: build ────────────────────────────────────────────

build-docker-image:
  stage: build
  # Override default: use Docker image for this job (not Python)
  image: docker:24.0.5
  services:
    # Docker-in-Docker: allows running docker commands inside a container
    # Requires Runner with --privileged flag OR Docker socket binding
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    # Image tags use GitLab predefined variables
    # CI_REGISTRY_IMAGE = registry.gitlab.com/<namespace>/<project>
    IMAGE_TAG: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    IMAGE_TAG_LATEST: "$CI_REGISTRY_IMAGE:latest"
  # Override default before_script (no pip needed for Docker stage)
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - echo "▶ Building Docker image: $IMAGE_TAG"
    - docker build
        --tag $IMAGE_TAG
        --tag $IMAGE_TAG_LATEST
        --label "pipeline.id=$CI_PIPELINE_ID"
        --label "commit.sha=$CI_COMMIT_SHA"
        --label "built.at=$(date -Iseconds)"
        .
    - echo "▶ Pushing to GitLab Container Registry"
    - docker push $IMAGE_TAG
    - docker push $IMAGE_TAG_LATEST
    - echo "✅ Image pushed: $IMAGE_TAG"
  # Only build Docker images for main branch and tags (not feature branches)
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'
  # Must run on a Runner with docker executor capability
  tags:
    - docker

# ─── STAGE: package ──────────────────────────────────────────

generate-deployment-manifest:
  stage: package
  image: alpine:latest
  # No pip install needed — override default before_script
  before_script: []
  script:
    - echo "▶ Generating deployment manifest"
    - |
      cat > deployment-manifest.yaml << MANIFEST_EOF
      # ==========================================
      # RoboVision Controller Deployment Manifest
      # ==========================================
      # Auto-generated by CI/CD pipeline
      # DO NOT EDIT MANUALLY

      metadata:
        pipeline_id: "${CI_PIPELINE_ID}"
        pipeline_url: "${CI_PIPELINE_URL}"
        commit_sha: "${CI_COMMIT_SHA}"
        commit_short_sha: "${CI_COMMIT_SHORT_SHA}"
        commit_ref: "${CI_COMMIT_BRANCH}"
        built_by: "${GITLAB_USER_NAME}"
        project: "${CI_PROJECT_NAME}"

      deployment:
        image: "${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}"
        environment: staging
        replicas: 2
        port: 5000
        health_check: "/health"

      labels:
        app: robovision-controller
        version: "${CI_COMMIT_SHORT_SHA}"
        managed-by: gitlab-ci
      MANIFEST_EOF
    - echo "▶ Manifest content:"
    - cat deployment-manifest.yaml
    - echo "✅ Manifest generated successfully"
  artifacts:
    name: "deployment-manifest-${CI_COMMIT_SHORT_SHA}"
    paths:
      - deployment-manifest.yaml
    expire_in: 90 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'

# ─── INFORMATIONAL: Predefined Variables Used ────────────────
# The following GitLab predefined variables are used above.
# Full list: https://docs.gitlab.com/ee/ci/variables/predefined_variables.html
#
# $CI_PIPELINE_ID           Unique pipeline ID (integer)
# $CI_PIPELINE_URL          Full URL to this pipeline
# $CI_COMMIT_SHA            Full 40-char commit hash
# $CI_COMMIT_SHORT_SHA      First 8 chars of commit hash
# $CI_COMMIT_BRANCH         Branch name (empty for tags)
# $CI_COMMIT_TAG            Tag name (only set for tag pipelines)
# $CI_PROJECT_NAME          Repository name
# $CI_REGISTRY              GitLab Container Registry hostname
# $CI_REGISTRY_IMAGE        Full path to project's registry: registry.../project
# $CI_REGISTRY_USER         Username for registry login ($CI_JOB_TOKEN internally)
# $CI_REGISTRY_PASSWORD     Password for registry login (= CI_JOB_TOKEN)
# $CI_JOB_TOKEN             Short-lived token for this job (scoped, expires on job end)
# $GITLAB_USER_NAME         GitLab username that triggered the pipeline
# $CI_PIPELINE_SOURCE       Trigger source: push|merge_request_event|web|schedule|api
